name: Nightly Release

on:
  workflow_dispatch:
  schedule:
    - cron: '42 0 * * *'

jobs:
  nightly-prerelease:
    permissions: write-all
    runs-on: ubuntu-latest
    container: ghcr.io/alisterd51/cross-toolchain:nightly
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Build ISO
        run: |
          make iso BUILD=release BOOTPROTOCOL=multiboot2 BOOTLOADER=grub
          make iso BUILD=release BOOTPROTOCOL=multiboot2 BOOTLOADER=limine
      - name: Create nightly tag
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/nightly',
              sha: context.sha
            }).catch(err => {
              if (err.status !== 422) throw err;
              github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/nightly',
                sha: context.sha
              });
            })
      - name: Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            build/release/gratos.x86.grub.iso
            build/release/gratos.x86.limine.iso
          prerelease: true
          name: nightly
          tag_name: nightly
